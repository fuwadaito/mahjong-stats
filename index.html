<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>JAN STA</title>
        <link rel="stylesheet" href="./style.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    </head>
    <body>
        <header class="header">
            <div class="brand">JAN STA</div>
            <nav>
            <a href="#" id="nav-home" class="active">ダッシュボード</a>
            <a href="#" id="nav-records">対局記録</a>
            <a href="#" id="nav-players">プレイヤー</a>
            <a href="#" id="nav-settings">設定</a>
            <button id="btn-new" class="btn">+ 新規対局</button>
            </nav>
        </header>

        <main id="app">
            <!-- HOME / Dashboard -->
            <section id="home" class="page">
            <div class="stats">
                <div class="stat">総対戦数
        <span id="stat-matches">0</span></div>
                <div class="stat">平均順位
        <span id="stat-avg">0.00</span></div>
                <div class="stat">ラス回避率
        <span id="stat-last">0%</span></div>
                <div class="stat">連対率
        <span id="stat-top2">0%</span></div>
                <div class="stat">総合収支
        <span id="stat-earn">0</span></div>
            </div>

            <div class="charts">
                <div class="card">
                <h3>累計収支の推移</h3>
                <canvas id="balanceChart" height="120"></canvas>
                </div>
                <div class="row">
                <div class="card small">
                    <h4>順位分布</h4>
                    <canvas id="pieRank" height="140"></canvas>
                </div>
                <div class="card small">
                    <h4>プレイヤー別成績</h4>
                    <ul id="player-list"></ul>
                </div>
                </div>
            </div>
            </section>

            <!-- ルール選択画面（新規対局） -->
            <section id="newMatch" class="page hidden">
            <div class="panel">
                <h2>ルール選択</h2>
                <label>日時 <input id="rule-date" type="datetime-local"></label>
                <label>初期点数 <input id="rule-init" type="number" value="25000"></label>
                <label>返し点 <input id="rule-return" type="number" value="30000"></label>

                <div class="uma">
                <label>ウマ（左→右）</label>
                <input class="uma-in" id="uma0" type="number" value="30">
                <input class="uma-in" id="uma1" type="number" value="10">
                <input class="uma-in" id="uma2" type="number" value="-10">
                <input class="uma-in" id="uma3" type="number" value="-30">
                </div>

                <label>チップレート（1枚あたりポイント） <input id="chip-rate" type="number" value="100"></label>

                <label>レート
                <select id="rate-select">
                    <option value="0.1">テンピン (0.1)</option>
                    <option value="0.01">テンイチ (0.01)</option>
                    <option value="0.03">テンサン (0.03)</option>
                    <option value="0.05">テンゴ (0.05)</option>
                </select>
                </label>

                <label>プレイヤー選択（下から4名選択）</label>
                <div id="players-choose"></div>

                <div class="actions">
                <button id="start-record" class="btn">記録開始</button>
                <button id="cancel-new" class="btn ghost">キャンセル</button>
                </div>
            </div>
            </section>

            <!-- 記録画面（各対局） -->
            <section id="match" class="page hidden">
            <div class="panel">
                <h2>対局記録</h2>
                <div class="match-meta">
                <div>日時: <span id="match-date"></span></div>
                <div>初期点: <span id="match-init"></span> 返し点: <span id="match-return"></span></div>
                <div>ウマ: <span id="match-uma"></span> レート: <span id="match-rate"></span> チップ単価: <span id="match-chip"></span></div>
                </div>

                <table class="score-table">
                <thead><tr><th>選手</th><th>点数(A〜D)</th><th>チップ差</th><th>計算後点数</th><th>ポイント</th></tr></thead>
                <tbody id="score-rows"></tbody>
                </table>

                <div class="match-actions">
                <button id="next-match" class="btn">次の対局へ</button>
                <button id="chip-settle" class="btn">チップ精算</button>
                <button id="show-result" class="btn">対戦結果表示</button>
                <button id="end-match" class="btn ghost">終了</button>
                </div>
            </div>
            </section>

            <!-- 対戦結果（簡易） -->
            <section id="result" class="page hidden">
            <div class="panel">
                <h2>対戦結果</h2>
                <table class="result-table">
                <thead><tr><th>選手</th><th>点数</th><th>ポイント</th></tr></thead>
                <tbody id="result-rows"></tbody>
                </table>
                <div class="actions">
                <button id="result-close" class="btn">閉じる</button>
                </div>
            </div>
            </section>

            <!-- プレイヤー管理 -->
            <section id="players" class="page hidden">
            <div class="panel">
                <h2>プレイヤー登録</h2>
                <label>名前 <input id="player-name" type="text"></label>
                <div class="actions">
                <button id="add-player" class="btn">登録</button>
                </div>

                <h3>プレイヤー一覧</h3>
                <ul id="players-list-simple"></ul>
            </div>
            </section>
        </main>

        <footer class="footer">© JAN STA</footer>
        <script src="./app.js"></script>
    </body>
</html>
